<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film – TvSuper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080809;
      --surface: #111114;
      --surface2:#18181d;
      --border:  rgba(255,255,255,0.07);
      --accent:  #e8a020;
      --text:    #f0ede8;
      --muted:   #7a7870;
    }

    body {
      background-color: var(--bg);
      background-size: cover;
      background-position: center top;
      background-attachment: fixed;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      color: var(--text);
      min-height: 100vh;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.35;
    }

    .overlay {
      background: linear-gradient(
        180deg,
        rgba(8,8,9,0.55) 0%,
        rgba(8,8,9,0.82) 30%,
        rgba(8,8,9,0.97) 100%
      );
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 70px;
      background: linear-gradient(180deg, rgba(8,8,9,0.98) 0%, rgba(8,8,9,0.6) 100%);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent) 0%, #fff 50%, var(--accent) 100%);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 6s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 0% }
      100% { background-position: 300% }
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 8px 18px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* ── TRAILER ── */
    .trailer-box {
      width: 100%;
      height: 420px;
      position: relative;
      z-index: 1;
      transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.5s ease;
    }
    .trailer-box.expanded {
      height: 85vh;
      box-shadow: 0 0 80px rgba(0,0,0,0.95);
      z-index: 10;
    }
    .trailer-box iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .trailer-label {
      position: absolute;
      top: 14px;
      left: 18px;
      background: rgba(8,8,9,0.75);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 4px;
      pointer-events: none;
      transition: opacity 0.4s;
      z-index: 2;
    }
    .trailer-box.expanded .trailer-label { opacity: 0; }

    /* ── MAIN LAYOUT ── */
    .container {
      max-width: 1400px;
      margin: auto;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 40px;
      padding: 20px 2.5rem;
      margin-top: -120px;
      position: relative;
      z-index: 2;
    }
    .trailer-box.expanded ~ .container { margin-top: 20px; }

    /* ── LEFT COL ── */
    .poster {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 0 1px var(--border);
      transform: translateY(-40px);
      display: block;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-top: 10px;
      margin-bottom: 0.6rem;
    }

    .rating {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(232,160,32,0.12);
      border: 1px solid rgba(232,160,32,0.3);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 0.7rem;
    }

    .genres {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 4px;
      line-height: 1.8;
    }
    .genre-tag {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 10px;
      margin: 2px 3px 2px 0;
      font-size: 0.75rem;
    }

    .buttons {
      margin-top: 1.5rem;
    }
    .title-row { display:flex; align-items:center; gap:12px; }
    .heart-btn { font-size:1.1rem; padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer }
    .heart-btn.liked { color: #ff4d4d; background: rgba(255,77,77,0.06); border-color: rgba(255,77,77,0.12); }

    /* ── RIGHT COL ── */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .player iframe {
      width: 100%;
      height: 500px;
      border-radius: 12px;
      border: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px var(--border);
      display: block;
      background: var(--surface);
    }

    .desc-box {
      font-size: 0.9rem;
      color: rgba(240,237,232,0.75);
      line-height: 1.8;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      border-radius: 0 10px 10px 0;
      padding: 1.2rem 1.5rem;
    }
    .desc-box h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    /* ── LOADER ── */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s;
    }
    #loader.done { opacity: 0; pointer-events: none; }
    .loader-logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--accent), #fff, var(--accent));
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 2.5s linear infinite;
    }
  </style>
</head>

<body>

<div id="loader"><div class="loader-logo">TvSuper</div></div>

<div class="overlay">

  <!-- TOPBAR -->
    <div class="topbar">
    <a class="logo" href="/">TvSuper</a>
    <button id="btnBack" class="back-btn">Wróć</button>
  </div>

  <!-- TRAILER -->
  <div class="trailer-box" id="trailerBox">
    <span class="trailer-label">Trailer</span>
    <iframe id="trailerFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>

  <!-- MAIN -->
  <div class="container">

    <!-- LEFT -->
    <div>
      <img id="poster" class="poster" alt="Plakat">
      <div class="title-row">
        <h1 id="title"></h1>
        <button id="favBtn" class="heart-btn" title="Lubię to">Polub</button>
      </div>
      <div class="rating" id="rating"></div>
      <div class="genres" id="genres"></div>
    </div>

    <!-- RIGHT -->
    <div class="right-col">
      <div class="player">
        <iframe id="playerFrame" allowfullscreen></iframe>
      </div>
      <div class="desc-box">
        <h2>Opis</h2>
        <div id="desc"></div>
      </div>
    </div>

  </div>
</div>

<script>
const TMDB_KEY  = "bb6f3e486fbce89586745ded69c13681";
const MOVIES_URL = "movies.json";
const AUTH_KEY = 'tvsuper_auth';

/* ── TRAILER EXPAND ── */
const trailerBox = document.getElementById("trailerBox");
let trailerPlaying = false;

window.addEventListener("message", e => {
  if (e.origin !== "https://www.youtube.com") return;
  try {
    const d = JSON.parse(e.data);
    if (d.event === "onStateChange") {
      if (d.info === 1 || d.info === 3) {
        trailerPlaying = true;
        trailerBox.classList.add("expanded");
      } else {
        trailerPlaying = false;
        trailerBox.classList.remove("expanded");
      }
    }
  } catch(e) {}
});

document.addEventListener("click", e => {
  if (trailerPlaying && !trailerBox.contains(e.target)) {
    trailerPlaying = false;
    trailerBox.classList.remove("expanded");
  }
});

/* ── TŁUMACZENIE ── */
async function translateToPolish(text) {
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|pl`;
    const r = await fetch(url);
    const d = await r.json();
    return d.responseData.translatedText || text;
  } catch { return text; }
}

  /* ── LOAD ── */
const GENRE_NAMES = {
  28:"Akcja", 12:"Przygodowy", 16:"Animacja", 35:"Komedia",
  80:"Kryminał", 18:"Dramat", 14:"Fantasy", 27:"Horror",
  9648:"Tajemnica", 10749:"Romans", 878:"Sci‑Fi", 53:"Thriller",
  10752:"Wojenny", 37:"Western"
};

async function loadMovie() {
  const id = new URLSearchParams(window.location.search).get("id");
  const movies = await fetch(MOVIES_URL).then(r => r.json());
  // Prefer lookup by stable `id` property; fallback to array index if no match
  let movie = null;
  if (Array.isArray(movies)) {
    movie = movies.find(m => m && (String(m.id) === String(id)));
    if (!movie && id !== null && !isNaN(id)) movie = movies[Number(id)];
  }
  if (!movie) return;

  document.title = `${movie.title} – TvSuper`;

  const tmdbRes = await fetch(
    `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(movie.titleEn || movie.title)}&language=pl-PL`
  );
  const tmdb = (await tmdbRes.json()).results?.[0];

  /* Tło */
  if (tmdb?.backdrop_path)
    document.body.style.backgroundImage = `url(https://image.tmdb.org/t/p/original${tmdb.backdrop_path})`;

  /* Trailer */
  if (movie.trailer)
    document.getElementById("trailerFrame").src =
      `https://www.youtube.com/embed/${movie.trailer}?autoplay=0&enablejsapi=1`;

  /* Plakat */
  if (tmdb?.poster_path)
    document.getElementById("poster").src = `https://image.tmdb.org/t/p/w500${tmdb.poster_path}`;

  /* Tytuł */
  document.getElementById("title").textContent = movie.title;

  /* Ocena */
  const rating = tmdb?.vote_average ? (+tmdb.vote_average).toFixed(1) : (movie.rating || null);
  document.getElementById("rating").textContent = rating ? `★ ${rating} / 10` : "Brak oceny";

  /* Gatunki */
  const genresEl = document.getElementById("genres");
  genresEl.innerHTML = "";
  (tmdb?.genre_ids || movie.genres || []).forEach(gid => {
    const name = GENRE_NAMES[gid];
    if (!name) return;
    const tag = document.createElement("span");
    tag.className = "genre-tag";
    tag.textContent = name;
    genresEl.appendChild(tag);
  });

  /* Opis */
  const overview = tmdb?.overview || movie.description || "";
  const translated = overview ? await translateToPolish(overview) : "Brak opisu.";
  document.getElementById("desc").textContent = translated;

  /* Player */
  if (movie.videoLink)
    document.getElementById("playerFrame").src = movie.videoLink;

  /* Ukryj loader */
  document.getElementById("loader").classList.add("done");
  setTimeout(() => document.getElementById("loader")?.remove(), 600);

  // Favorite button handling - persistent per-user in localStorage (same behaviour as for serials)
  const favBtn = document.getElementById('favBtn');
  if (favBtn) {
    let isFavorite = false;

    function updateFavButtonUI() {
      if (isFavorite) {
        favBtn.textContent = "Polubione";
        favBtn.classList.add('liked');
        favBtn.style.borderColor = "#ff4d4d";
        favBtn.style.color = "#ff4d4d";
      } else {
        favBtn.textContent = "Polub";
        favBtn.classList.remove('liked');
        favBtn.style.borderColor = "var(--border)";
        favBtn.style.color = "var(--muted)";
      }
    }

    function checkFavoriteStatus() {
      const currentUser = JSON.parse(localStorage.getItem(AUTH_KEY));
      if (currentUser) {
        const favs = currentUser.favorites || [];
        isFavorite = favs.some(f => f.id === String(movie.id));
        updateFavButtonUI();
      } else {
        isFavorite = false;
        updateFavButtonUI();
      }
    }

    favBtn.addEventListener('click', async () => {
      const currentUser = JSON.parse(localStorage.getItem(AUTH_KEY));
      if (!currentUser) {
        alert('Zaloguj się, aby polubić film!');
        return;
      }

      let favs = currentUser.favorites || [];
      if (isFavorite) {
        favs = favs.filter(f => f.id !== String(movie.id));
        isFavorite = false;
      } else {
        favs.push({
          id: String(movie.id),
          title: movie.title,
          poster: tmdb?.poster_path ? `https://image.tmdb.org/t/p/w500${tmdb.poster_path}` : (movie.poster || null),
          isTv: false
        });
        isFavorite = true;
      }

      currentUser.favorites = favs;
      localStorage.setItem(AUTH_KEY, JSON.stringify(currentUser));
      updateFavButtonUI();

      try {
        const db = JSON.parse(localStorage.getItem('tvsuper_users_data') || '{}');
        if (!db[currentUser.username]) db[currentUser.username] = {password: '', favorites: [], planned: [], watched: {}};
        db[currentUser.username].favorites = favs.map(f => 'm_' + f.id);
        localStorage.setItem('tvsuper_users_data', JSON.stringify(db));
      } catch(e) { /* ignore */ }
    });

    // initialize state
    checkFavoriteStatus();
  }
}

  loadMovie();

  // Przyciski powrotu - bezpieczne zachowanie
  const btnBack = document.getElementById("btnBack");
  if (btnBack) {
    btnBack.onclick = () => {
      if (document.referrer && document.referrer.includes("index.html")) {
        window.history.back();
      } else {
        window.location.href = "index.html";
      }
    };
  }
</script>

</body>
</html>
