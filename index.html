<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#080809">
  <meta name="color-scheme" content="dark">
  <title>TvSuper - Filmy, Seriale, TV Online</title>
  <meta name="description" content="Oglądaj filmy, seriale i telewizję na żywo online za darmo. TvSuper - Twoja biblioteka rozrywki.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>

  <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
  </button>
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="logo-wrapper">
      <img class="logo-img" src="favicon.ico" alt="TvSuper">
    </div>
    <nav class="nav-menu" aria-label="Glowna nawigacja">
      <button class="nav-btn tab-btn active" data-tab="movies" aria-label="Filmy">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg>
        <span class="nav-text">Filmy</span>
      </button>
      <button class="nav-btn tab-btn" data-tab="serials" aria-label="Seriale">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
        <span class="nav-text">Seriale</span>
      </button>
      <button class="nav-btn tab-btn" data-tab="tv" aria-label="TV Na Zywo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
        <span class="nav-text">TV Na Zywo</span>
      </button>
    </nav>
    <div class="sb-search">
      <div class="search-icon-fixed">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
      </div>
      <input id="searchInput" type="text" placeholder="Szukaj..." aria-label="Wyszukiwarka" autocomplete="off">
      <button class="search-clear" id="searchClear" style="display:none;position:absolute;right:15px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;z-index:2;" aria-label="Wyczysc wyszukiwanie">✕</button>
    </div>
    <div class="sb-auth">
      <div id="authStatus" class="auth-status" style="display:none;width:100%;">
        <div class="nav-btn" style="color:var(--accent);cursor:default;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <span id="authUserLabel" class="nav-text"></span>
        </div>
        <button id="btnLogout" class="nav-btn logout-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          <span class="nav-text">Wyloguj</span>
        </button>
      </div>
      <button id="authButton" class="nav-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span class="nav-text">Zaloguj</span>
      </button>
    </div>
  </aside>

  <div id="authModal" class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="authTitle">
    <div class="auth-modal-inner">
      <button class="auth-close" id="authClose" aria-label="Zamknij">✕</button>
      <h3 id="authTitle">Zaloguj</h3>
      <div class="auth-msg" id="authMsg"></div>
      <input id="modalUser" placeholder="Nazwa uzytkownika" autocomplete="username">
      <input id="modalPass" placeholder="Haslo" type="password" autocomplete="current-password">
      <div class="auth-modal-actions">
        <button id="modalSubmit">Zaloguj</button>
        <button id="modalToggle">Utworz konto</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <div id="favoritesSection"><div id="favContent"></div></div>
  <div id="content"></div>

  <div id="categoryView" class="category-view">
    <div class="category-view-header">
      <button class="back-btn" id="backToHome">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Powrót
      </button>
      <h2 id="categoryViewTitle" style="font-family:'Playfair Display',serif;font-size:1.8rem;"></h2>
    </div>
    <div id="categoryViewContent" style="margin-left:var(--sidebar-w);padding:1rem 2.5rem 4rem;"></div>
  </div>

  <div id="tvPlayerModal" class="tv-modal" role="dialog" aria-modal="true" aria-label="Odtwarzacz TV">
    <div class="tv-modal-content">
      <button class="tv-close" id="closeTvBtn" title="Zamknij TV" aria-label="Zamknij odtwarzacz">✕</button>
      <iframe id="tvIframe" src="" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen title="TV na zywo"></iframe>
    </div>
  </div>

  <button class="scroll-top" id="scrollTopBtn" aria-label="Przewin do góry">↑</button>

  <script src="js/index.js"></script>
  <script>
    // Register service worker (only if supported)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function(err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
