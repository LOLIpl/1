<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TvSuper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/detail.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
</head>
<body>

<div id="loader"><div class="loader-logo">TvSuper</div></div>

<div class="overlay">
  <div class="topbar">
    <a class="logo" href="/">TvSuper</a>
    <div class="topbar-right">
      <button class="fav-btn" id="favBtn">
        <span class="fav-heart">+</span>
        <span class="fav-label">Polub</span>
      </button>
      <button id="btnBack" class="back-btn">Wróc</button>
    </div>
  </div>

  <div class="trailer-box" id="trailerBox">
    <span class="trailer-label">Trailer</span>
    <span class="badge-type" id="typeBadge"></span>
    <iframe id="trailerFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>

  <div class="container">
    <div>
      <img id="poster" class="poster" alt="Plakat">
      <div class="title-row">
        <h1 id="title"></h1>
      </div>
      <div class="rating" id="rating"></div>
      <div class="meta-row" id="metaRow"></div>
      <div class="genres" id="genres"></div>
    </div>

    <div class="right-col">
      <div class="season-bar" id="seasonBar" style="display:none">
        <label>Sezon:</label>
        <select class="season-select" id="seasonSelect"></select>
        <div class="watched-stats" id="watchedStats">
          <div class="watched-bar"><div class="watched-bar-fill" id="watchedBarFill"></div></div>
          <span id="watchedCountLabel"></span>
        </div>
      </div>

      <div class="player">
        <iframe id="playerFrame" allowfullscreen></iframe>
      </div>

      <div class="episodes-box" id="episodesBox" style="display:none">
        <div class="episodes-header">
          <span class="episodes-header-title serial">Odcinki</span>
          <div class="episodes-header-right">
            <button class="mark-all-btn" id="markAllBtn">Zaznacz wszystkie</button>
            <button class="unmark-all-btn" id="unmarkAllBtn">Odznacz wszystkie</button>
          </div>
        </div>
        <div id="episodesList"></div>
      </div>

      <div class="desc-box">
        <div id="desc"></div>
      </div>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
  /* -- DETAIL PAGE CONFIG -- */
  const TMDB_KEY = CONFIG.TMDB_KEY;
  const AUTH_KEY = CONFIG.AUTH_KEY;
  const MOVIES_URL = CONFIG.MOVIES_URL;
  const SERIALS_URL = CONFIG.SERIALS_URL;

  const params = new URLSearchParams(window.location.search);
  const itemId = params.get("id");
  const itemType = params.get("type") || "movie"; // "movie" or "serial"
  const isSerial = itemType === "serial";

  let currentItem = null;
  let currentSeasonIndex = 0;

  /* -- TRAILER EXPAND -- */
  const trailerBox = document.getElementById("trailerBox");
  let trailerPlaying = false;
  window.addEventListener("message", function(e) {
    if (e.origin !== "https://www.youtube.com") return;
    try {
      var d = JSON.parse(e.data);
      if (d.event === "onStateChange") {
        if (d.info === 1 || d.info === 3) { trailerPlaying = true; trailerBox.classList.add("expanded"); }
        else { trailerPlaying = false; trailerBox.classList.remove("expanded"); }
      }
    } catch(e) {}
  });
  document.addEventListener("click", function(e) {
    if (trailerPlaying && !trailerBox.contains(e.target)) {
      trailerPlaying = false;
      trailerBox.classList.remove("expanded");
    }
  });

  /* -- AUTH HELPERS -- */
  function getAuth() {
    try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch(e) { return null; }
  }

  /* -- FAVORITES (detail page) -- */
  async function getFavorites() {
    var auth = getAuth();
    if (auth && auth.username) {
      try {
        var db = JSON.parse(localStorage.getItem('tvsuper_users_data') || '{}');
        var user = db[auth.username];
        return (user && user.favorites) ? user.favorites : [];
      } catch(e) { return []; }
    }
    try { return JSON.parse(localStorage.getItem('tvsuper_favorites')) || []; } catch { return []; }
  }

  async function saveFavorites(list) {
    var auth = getAuth();
    if (auth && auth.username) {
      try {
        var db = JSON.parse(localStorage.getItem('tvsuper_users_data') || '{}');
        if (!db[auth.username]) db[auth.username] = {password: '', favorites: [], planned: [], watched: {}};
        db[auth.username].favorites = list;
        localStorage.setItem('tvsuper_users_data', JSON.stringify(db));
      } catch(e) {}
    } else {
      try { localStorage.setItem('tvsuper_favorites', JSON.stringify(list)); } catch(e) {}
    }
  }

  function makeId(id) { return (isSerial ? 's_' : 'm_') + id; }

  async function toggleFavorite() {
    var btn = document.getElementById("favBtn");
    var heart = btn.querySelector(".fav-heart");
    var label = btn.querySelector(".fav-label");
    var favs = await getFavorites();
    var pid = makeId(itemId);
    var already = favs.indexOf(pid) >= 0;
    if (already) {
      favs = favs.filter(function(f) { return f !== pid; });
      await saveFavorites(favs);
      btn.classList.remove("active");
      heart.textContent = "+";
      label.textContent = "Polub";
    } else {
      favs.push(pid);
      await saveFavorites(favs);
      btn.classList.add("active");
      heart.textContent = "+";
      label.textContent = "Polubiono";
      heart.style.transform = "scale(1.5)";
      setTimeout(function() { heart.style.transform = ""; }, 300);
    }
  }

  async function updateFavBtn() {
    var btn = document.getElementById("favBtn");
    var heart = btn.querySelector(".fav-heart");
    var label = btn.querySelector(".fav-label");
    var pid = makeId(itemId);
    var favs = await getFavorites();
    if (favs.indexOf(pid) >= 0) {
      btn.classList.add("active");
      heart.textContent = "+";
      label.textContent = "Polubiono";
    } else {
      btn.classList.remove("active");
      heart.textContent = "+";
      label.textContent = "Polub";
    }
  }

  document.getElementById("favBtn").addEventListener("click", toggleFavorite);

  /* -- WATCHED (serial only) -- */
  function getWatchedKey() {
    var auth = getAuth();
    if (auth && auth.username && itemId) return "watched_" + auth.username + "_" + itemId;
    if (!itemId) return 'tvsuper_watched_null';
    return "tvsuper_watched_" + itemId;
  }

  async function getWatched() {
    try { return JSON.parse(localStorage.getItem(getWatchedKey())) || {}; } catch { return {}; }
  }

  async function saveWatched(obj) {
    try { localStorage.setItem(getWatchedKey(), JSON.stringify(obj)); } catch(e) {}
  }

  function epKey(si, ei) { return si + "_" + ei; }

  async function isWatched(si, ei) {
    var w = await getWatched();
    return !!w[epKey(si, ei)];
  }

  async function toggleWatched(si, ei) {
    var w = await getWatched();
    var k = epKey(si, ei);
    if (w[k]) delete w[k]; else w[k] = true;
    await saveWatched(w);
  }

  async function markAllWatched(si, total) {
    var w = await getWatched();
    for (var i = 0; i < total; i++) w[epKey(si, i)] = true;
    await saveWatched(w);
  }

  async function unmarkAllWatched(si, total) {
    var w = await getWatched();
    for (var i = 0; i < total; i++) delete w[epKey(si, i)];
    await saveWatched(w);
  }

  async function countWatched(si, total) {
    var w = await getWatched();
    var n = 0;
    for (var i = 0; i < total; i++) if (w[epKey(si, i)]) n++;
    return n;
  }

  async function updateProgress(si, total) {
    var n = await countWatched(si, total);
    var pct = total > 0 ? Math.round((n / total) * 100) : 0;
    document.getElementById("watchedBarFill").style.width = pct + "%";
    document.getElementById("watchedCountLabel").innerHTML = '<span class="watched-count">' + n + '</span>&nbsp;/ ' + total + ' odc.';
  }

  /* -- TRANSLATE -- */
  async function translateToPolish(text) {
    try {
      var r = await fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(text) + "&langpair=en|pl");
      var d = await r.json();
      return d.responseData.translatedText || text;
    } catch { return text; }
  }

  /* -- SEASONS / EPISODES UI -- */
  function buildSeasonUI(serial) {
    if (!serial.seasons || !serial.seasons.length) {
      if (serial.videoLink) document.getElementById("playerFrame").src = serial.videoLink;
      return;
    }
    document.getElementById("seasonBar").style.display = "flex";
    document.getElementById("episodesBox").style.display = "block";

    var seasonSelect = document.getElementById("seasonSelect");
    seasonSelect.innerHTML = "";
    serial.seasons.forEach(function(s, i) {
      var opt = document.createElement("option");
      opt.value = i;
      opt.textContent = s.name || "Sezon " + (i + 1);
      seasonSelect.appendChild(opt);
    });

    seasonSelect.addEventListener("change", function() {
      currentSeasonIndex = +seasonSelect.value;
      renderEpisodes(serial, currentSeasonIndex);
    });

    document.getElementById("markAllBtn").addEventListener("click", async function() {
      var eps = serial.seasons[currentSeasonIndex] && serial.seasons[currentSeasonIndex].episodes || [];
      await markAllWatched(currentSeasonIndex, eps.length);
      renderEpisodes(serial, currentSeasonIndex);
    });
    document.getElementById("unmarkAllBtn").addEventListener("click", async function() {
      var eps = serial.seasons[currentSeasonIndex] && serial.seasons[currentSeasonIndex].episodes || [];
      await unmarkAllWatched(currentSeasonIndex, eps.length);
      renderEpisodes(serial, currentSeasonIndex);
    });

    renderEpisodes(serial, 0);
  }

  async function renderEpisodes(serial, si) {
    var season = serial.seasons[si];
    var list = document.getElementById("episodesList");
    list.innerHTML = "";

    if (!season || !season.episodes || !season.episodes.length) {
      list.innerHTML = '<div style="padding:1rem 1.2rem;color:var(--muted);font-size:0.85rem;">Brak odcinków.</div>';
      return;
    }

    var eps = season.episodes;
    var total = eps.length;
    await updateProgress(si, total);

    for (var i = 0; i < eps.length; i++) {
      var ep = eps[i];
      var watched = await isWatched(si, i);
      var item = document.createElement("div");
      item.className = "episode-item" + (i === 0 ? " active" : "") + (watched ? " watched" : "");

      item.innerHTML = '<span class="ep-num">E' + String(i + 1).padStart(2, "0") + '</span>' +
        '<span class="ep-title">' + (ep.title || "Odcinek " + (i + 1)) + '</span>' +
        '<span class="ep-play">▶ Ogladaj</span>' +
        '<button class="ep-watched-btn" title="' + (watched ? "Oznacz jako nieobejrzany" : "Oznacz jako obejrzany") + '">✓</button>';

      var watchedBtn = item.querySelector(".ep-watched-btn");
      watchedBtn.addEventListener("click", async function(ev) {
        ev.stopPropagation();
        await toggleWatched(si, i);
        var nowWatched = await isWatched(si, i);
        item.classList.toggle("watched", nowWatched);
        watchedBtn.title = nowWatched ? "Oznacz jako nieobejrzany" : "Oznacz jako obejrzany";
        await updateProgress(si, total);
      });

      item.addEventListener("click", function() {
        document.querySelectorAll(".episode-item").forEach(function(el) { el.classList.remove("active"); });
        item.classList.add("active");
        if (ep.videoLink) document.getElementById("playerFrame").src = ep.videoLink;
      });

      list.appendChild(item);
    }

    if (eps[0] && eps[0].videoLink) document.getElementById("playerFrame").src = eps[0].videoLink;
  }

  /* -- META TAG -- */
  function addMetaTag(label, text) {
    var tag = document.createElement("span");
    tag.className = "meta-tag";
    tag.textContent = label + ": " + text;
    document.getElementById("metaRow").appendChild(tag);
  }

  /* -- LOAD -- */
  async function loadDetail() {
    var dataUrl = isSerial ? SERIALS_URL : MOVIES_URL;
    var items = await fetch(dataUrl).then(function(r) { return r.json(); });
    var item = null;
    if (Array.isArray(items)) {
      item = items.find(function(m) { return m && String(m.id) === String(itemId); });
      if (!item && itemId !== null && !isNaN(itemId)) item = items[Number(itemId)];
    }
    if (!item) { document.getElementById("loader").classList.add("done"); return; }
    currentItem = item;

    document.title = item.title + " – TvSuper";
    var typeLabel = isSerial ? "tv" : "movie";

    // Badge
    var badge = document.getElementById("typeBadge");
    badge.textContent = isSerial ? "SERIAL" : "FILM";
    badge.className = "badge-type " + (isSerial ? "serial" : "movie");

    // Accent color via CSS variable
    var accent = isSerial ? "#4fa8e8" : "#e8a020";
    document.documentElement.style.setProperty('--accent', accent);
    document.getElementById("rating").className = "rating " + (isSerial ? "serial" : "movie");
    document.querySelector(".episodes-header-title").className = "episodes-header-title " + (isSerial ? "serial" : "movie");

    // TMDB
    var tmdbRes = await fetch("https://api.themoviedb.org/3/search/" + typeLabel +
      "?api_key=" + TMDB_KEY + "&query=" + encodeURIComponent(item.titleEn || item.title) + "&language=pl-PL");
    var tmdbData = await tmdbRes.json();
    var tmdb = tmdbData.results && tmdbData.results[0] || null;

    if (tmdb) {
      if (tmdb.backdrop_path)
        document.body.style.backgroundImage = "url(https://image.tmdb.org/t/p/original" + tmdb.backdrop_path + ")";
      if (tmdb.poster_path)
        document.getElementById("poster").src = "https://image.tmdb.org/t/p/w500" + tmdb.poster_path;

      var rating = tmdb.vote_average ? (+tmdb.vote_average).toFixed(1) : null;
      document.getElementById("rating").textContent = rating ? "★ " + rating + " / 10" : "Brak oceny";

      (tmdb.genre_ids || []).forEach(function(gid) {
        var name = CONFIG.GENRE_NAMES[gid];
        if (!name) return;
        var tag = document.createElement("span");
        tag.className = "genre-tag";
        tag.textContent = name;
        document.getElementById("genres").appendChild(tag);
      });

      var overview = tmdb.overview || "";
      var translated = overview ? await translateToPolish(overview) : "Brak opisu.";
      document.getElementById("desc").textContent = translated;
    } else {
      if (item.poster) document.getElementById("poster").src = item.poster;
      document.getElementById("rating").textContent = item.rating ? "★ " + item.rating + " / 10" : "Brak oceny";
      document.getElementById("desc").textContent = item.description || "Brak opisu.";
    }

    document.getElementById("title").textContent = item.title;

    if (isSerial) {
      if (item.seasons)
        addMetaTag("Sezony", item.seasons.length + " " +
          (item.seasons.length === 1 ? "sezon" : item.seasons.length < 5 ? "sezony" : "sezonów"));
      if (item.year) addMetaTag("Rok", item.year);
      if (item.status) addMetaTag("Status", item.status);
    } else {
      if (item.year) addMetaTag("Rok", item.year);
    }

    if (item.trailer)
      document.getElementById("trailerFrame").src = "https://www.youtube.com/embed/" + item.trailer + "?autoplay=0&enablejsapi=1";

    if (isSerial) {
      buildSeasonUI(item);
    } else {
      if (item.videoLink) document.getElementById("playerFrame").src = item.videoLink;
    }

    updateFavBtn();

    document.getElementById("loader").classList.add("done");
    setTimeout(function() {
      var loader = document.getElementById("loader");
      if (loader) loader.remove();
    }, 600);
  }

  loadDetail();

  /* -- BACK BUTTON -- */
  var btnBack = document.getElementById("btnBack");
  if (btnBack) {
    btnBack.onclick = function() {
      if (document.referrer && document.referrer.includes("index.html")) {
        window.history.back();
      } else {
        window.location.href = "index.html";
      }
    };
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').catch(function(err) {
        console.warn('SW registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
